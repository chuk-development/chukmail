name: chukmail
description: "Material Design IMAP email client. FOSS, no GMS."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Mail
  enough_mail: ^2.1.7
  enough_mail_html: ^2.0.0

  # State / routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # Storage
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # Background sync (no GMS — uses AlarmManager)
  workmanager: ^0.9.0+3

  # Notifications (FOSS, no FCM)
  flutter_local_notifications: ^17.2.3

  # Voice input
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # HTML rendering
  flutter_widget_from_html_core: ^0.15.2

  # PGP
  openpgp: ^3.6.0

  # Utils
  intl: ^0.19.0
  mime: ^1.0.5
  open_filex: ^4.5.0
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  uuid: ^4.5.1
  collection: ^1.18.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
